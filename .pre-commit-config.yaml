ci:
  autoupdate_schedule: monthly
  skip: [pixlet-format, pixlet-lint]
repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.15
  hooks:
    - id: ruff-check
    - id: ruff-format
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.11.17
  hooks:
    - id: uv-lock
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: v1.25.2
  hooks:
    - id: zizmor
- repo: local
  hooks:
    - id: pixlet-format
      name: Pixlet Format
      entry: pixlet format
      language: system
      types: [text]
      files: '\.star$'
    - id: pixlet-lint
      name: Pixlet Lint
      entry: pixlet lint
      language: system
      types: [text]
      files: '\.star$'
- repo: https://github.com/thlorenz/doctoc.git
  rev: v2.4.1
  hooks:
    - id: doctoc
      name: Add TOC for Markdown and RST files
      files: README\.md
