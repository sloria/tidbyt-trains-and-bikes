version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  groups:
    all-actions:
      patterns: ["*"]
  schedule:
    interval: "monthly"
- package-ecosystem: uv
  directory: "/"
  schedule:
    interval: monthly
  groups:
    all-dependencies:
      patterns: ["*"]
  open-pull-requests-limit: 3
