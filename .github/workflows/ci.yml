name: Tests And Linting

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0  # zizmor: ignore[cache-poisoning]

      - name: Install dependencies
        run: uv sync

      - name: Install pixlet
        run: |
          mkdir -p /tmp/pixlet-install
          cd /tmp/pixlet-install
          curl -LO https://github.com/tidbyt/pixlet/releases/download/v0.34.0/pixlet_0.34.0_linux_amd64.tar.gz
          tar -xvf pixlet_0.34.0_linux_amd64.tar.gz
          chmod +x pixlet
          mv pixlet /usr/local/bin/
          cd -
          rm -rf /tmp/pixlet-install

      - name: Load cached pre-commit dependencies
        id: cached-pre-commit-dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit/
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uv run pre-commit run --show-diff-on-failure --color=always --all-files
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0  # zizmor: ignore[cache-poisoning]

      - name: Install dependencies
        run: uv sync

      - name: Run mypy
        run: uv run mypy
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0  # zizmor: ignore[cache-poisoning]

      - name: Install dependencies
        run: uv sync

      - name: Install pixlet
        run: |
          mkdir -p /tmp/pixlet-install
          cd /tmp/pixlet-install
          curl -LO https://github.com/tidbyt/pixlet/releases/download/v0.34.0/pixlet_0.34.0_linux_amd64.tar.gz
          tar -xvf pixlet_0.34.0_linux_amd64.tar.gz
          chmod +x pixlet
          mv pixlet /usr/local/bin/
          cd -
          rm -rf /tmp/pixlet-install

      - name: Copy test .env file
        run: cp tests/.env.test .env

      - name: Run tests
        run: uv run pytest
